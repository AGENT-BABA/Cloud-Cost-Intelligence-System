services:
  - type: web
    name: cloud-cost-intelligence-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false          # You fill this in the Render dashboard — never commit it
      - key: OPENAI_MODEL
        value: gpt-4o-mini
    healthCheckPath: /health
