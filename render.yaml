services:
  - type: web
    name: cloud-cost-intelligence-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # You fill this in the Render dashboard
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
    healthCheckPath: /health
